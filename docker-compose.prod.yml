version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mi_estudio_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./backend/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mi_estudio_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mi_estudio_redis_prod
    restart: always
    volumes:
      - redis_data_prod:/data
    networks:
      - mi_estudio_network

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mi_estudio_web_prod
    restart: always
    env_file:
      - .env.prod
    volumes:
      - ./backend/media:/app/media
      - ./backend/static:/app/static
      - ./backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - mi_estudio_network
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mi_estudio_celery_prod
    restart: always
    env_file:
      - .env.prod
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs
    depends_on:
      - web
      - redis
    networks:
      - mi_estudio_network
    command: celery -A config worker -l info --concurrency 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api/v1
    container_name: mi_estudio_frontend_prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - mi_estudio_network

volumes:
  mysql_data_prod:
  redis_data_prod:

networks:
  mi_estudio_network:
    driver: bridge
