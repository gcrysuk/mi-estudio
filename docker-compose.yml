version: '3.8'

services:
  # Usamos el backend existente (desde backend/docker-compose.local.yml)
  # No necesitamos definirlo aquí porque ya está corriendo aparte

  frontend:
    build: ./frontend
    container_name: mi_estudio_frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
